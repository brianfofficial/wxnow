<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#38bdf8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>WXNOW</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <meta name="apple-mobile-web-app-title" content="WXNOW">
  <meta property="og:title" content="WXNOW — Minute-by-minute weather">
  <meta property="og:description" content="Free hyperlocal weather. No ads. No account. No tracking.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://wxnow.vercel.app">
  <meta property="og:image" content="https://wxnow.vercel.app/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="WXNOW — Minute-by-minute weather">
  <meta name="twitter:description" content="Free hyperlocal weather. No ads. No account.">
  <meta name="twitter:image" content="https://wxnow.vercel.app/og-image.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    try {
      var t = localStorage.getItem('wxnow-theme');
      if (t) document.documentElement.dataset.theme = t;
      else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.dataset.theme = 'dark';
      else document.documentElement.dataset.theme = 'light';
    } catch(e) {}
  </script>
</head>
<body>
  <div id="weather-bg">
    <div id="weather-bg-current"></div>
    <div id="weather-bg-next"></div>
    <div id="ambient-glow"></div>
  </div>
  <div id="pull-indicator"><span id="pull-text">↓ Pull to refresh</span></div>
  <div id="precip-indicator"></div>

  <div id="header" class="header-on-gradient">
    <h1>WXNOW</h1>
    <div class="header-actions">
      <div class="header-actions-row">
        <button id="btn-theme" class="header-btn-icon" title="Toggle theme">☀</button>
        <button id="btn-unit" class="header-btn-icon" title="Toggle units">°C</button>
        <button id="btn-refresh" class="header-btn-icon" title="Refresh">↻</button>
      </div>
      <div class="header-actions-row">
        <button id="btn-radar" class="header-btn-text">RADAR ↗</button>
        <button id="btn-share" class="header-btn-text">SHARE</button>
      </div>
    </div>
  </div>

  <div id="location-bar">
    <div id="saved-locations"></div>
    <div id="search-results"></div>
  </div>

  <div id="loading">Loading weather…</div>
  <div id="error" class="hidden"></div>

  <div id="weather-content" class="hidden">
    <div id="hero-card">
      <div id="location-label">Locating…</div>
      <div id="current">
        <div id="current-temp">--°</div>
        <div id="current-condition">--</div>
        <div id="weather-briefing" class="weather-briefing"></div>
        <div id="current-feels">--</div>
        <span id="feels-trend"></span>
      </div>
    </div>

    <div id="content-surface">
      <div id="stats-inline" class="stats-inline font-label"></div>

      <div id="alert-banner-nws" class="alert-banner-compact hidden">
        <span class="alert-banner-badge">⚠</span>
        <span class="alert-banner-text font-label"></span>
        <span class="alert-banner-arrow">›</span>
      </div>

      <div id="install-nudge" class="hidden">
        <span>📲 Install WXNOW — add to your home screen for instant access</span>
        <button id="btn-install-dismiss">✕</button>
      </div>

      <div id="tabs">
        <button class="tab-btn active" data-tab="tab-now">Now</button>
        <button class="tab-btn" data-tab="tab-hourly">Hourly</button>
        <button class="tab-btn" data-tab="tab-7day">7 Day</button>
      </div>

      <div id="tab-now" class="tab-panel active"></div>
      <div id="tab-hourly" class="tab-panel"></div>
      <div id="tab-7day" class="tab-panel"></div>

      <div id="footer">
        <div>Built with <span class="footer-heart">🤍</span> · No ads · No tracking · No account</div>
        <div class="footer-attr">Weather data via Open-Meteo + NOAA</div>
      </div>
    </div>
  </div>

  <div id="alert-sheet-overlay" class="sheet-overlay hidden">
    <div id="alert-sheet" class="sheet">
      <div class="sheet-handle"></div>
      <div id="alert-sheet-content"></div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
  <script src="app.js" defer></script>
</body>
</html>
