<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#38bdf8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>WXNOW</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <meta name="apple-mobile-web-app-title" content="WXNOW">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="precip-indicator"></div>
  <div id="bg-glow"></div>

  <div id="header">
    <h1>WXNOW</h1>
    <div class="header-actions">
      <button id="btn-share">↑</button>
      <button id="btn-unit" class="header-btn">°C</button>
      <button id="btn-radar" class="header-btn">RADAR ↗</button>
      <button id="btn-refresh">↻ Refresh</button>
    </div>
  </div>

  <div id="location-label">Locating…</div>

  <div id="search-bar">
    <input type="text" id="search-input" placeholder="Search city..." autocomplete="off"
      autocorrect="off" spellcheck="false" />
    <button id="btn-search-clear" class="hidden">✕</button>
    <div id="search-results"></div>
  </div>

  <div id="loading">Loading weather…</div>
  <div id="error" class="hidden"></div>

  <div id="weather-content" class="hidden">
    <div id="current">
      <div id="hero-left">
        <div id="current-temp">--°</div>
        <div id="current-condition">--</div>
        <div id="current-feels">--</div>
        <span id="feels-trend"></span>
      </div>
      <div id="hero-sparkline"></div>
    </div>

    <p id="rain-summary"></p>

    <div id="install-nudge" class="hidden">
      <span>📲 Install WXNOW — add to your home screen for instant access</span>
      <button id="btn-install-dismiss">✕</button>
    </div>

    <div id="alerts-container" class="hidden"></div>

    <div id="stats-bar"></div>

    <div id="now-always"></div>

    <div id="briefing-card">
      <div id="briefing-headline"></div>
      <div id="briefing-lines"></div>
    </div>

    <div id="tabs">
      <button class="tab-btn active" data-tab="tab-15min">15-Min</button>
      <button class="tab-btn" data-tab="tab-hourly">Hourly</button>
      <button class="tab-btn" data-tab="tab-7day">7-Day</button>
    </div>

    <div id="tab-15min" class="tab-panel active"></div>
    <div id="tab-hourly" class="tab-panel"></div>
    <div id="tab-7day" class="tab-panel"></div>
  </div>

  <div id="footer">WXNOW · Open-Meteo · Nominatim</div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
  <script src="app.js" defer></script>
</body>
</html>
